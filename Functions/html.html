<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Columns vs Rows</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 150px 150px 150px;
      grid-template-rows: 100px 100px;
      gap: 10px;
    }

    .box {
      background: lightblue;
      /* display: flex;
      align-items: center;
      justify-content: center; */
      font-weight: bold;
    }

    .label {
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="label">Grid with Columns (3) and Rows (2)</div>

  <div class="grid">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
  </div>

</body>
</html>
